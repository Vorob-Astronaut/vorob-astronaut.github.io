      - heading "Frequently Asked Questions" [level=2] [ref=e78]
      - generic [ref=e79]:
        - group [ref=e80]:
          - generic "How do I cancel my subscription?" [ref=e81] [cursor=pointer]:
            - generic [ref=e82]: How do I cancel my subscription?
          - generic [ref=e84]:
            - paragraph [ref=e85]: If you are receiving charges from Wulong LLC, you most likely subscribed directly through one of our product websites and have a web subscription.
            - paragraph [ref=e86]: "Here are the main characteristics of a Wulong LLC web subscription:"
            - list [ref=e87]:
              - listitem [ref=e88]: You paid with a credit/debit card
              - listitem [ref=e89]: You subscribed through our product website (tinnitusrelief.io or remotejobsboard.io)
              - listitem [ref=e90]: The descriptor on your bank statement says "Wulong LLC", "Stripe* Wulong", or a variation
              - listitem [ref=e91]: You received a receipt or welcome email from us (not from Apple or Google)
            - heading "How to Cancel" [level=4] [ref=e92]
            - paragraph [ref=e93]:
              - strong [ref=e94]: "Option 1: Via product website"
            - list [ref=e95]:
              - listitem [ref=e96]: Log in to your account on the product website (tinnitusrelief.io or remotejobsboard.io)
              - listitem [ref=e97]: Go to Account Settings
              - listitem [ref=e98]: Find Subscription Details and tap "Cancel Subscription"
            - paragraph [ref=e99]:
              - strong [ref=e100]: "Option 2: Via email"
            - paragraph [ref=e101]:
              - text: Send an email to
              - link "contact@wulongllc.com" [ref=e102] [cursor=pointer]:
                - /url: mailto:contact@wulongllc.com
              - text: "with the subject line \"Cancel Subscription\" and include:"
            - list [ref=e103]:
              - listitem [ref=e104]: Your full name
              - listitem [ref=e105]: Last 4 digits of your card
              - listitem [ref=e106]: Card brand (Visa, Mastercard, etc.)
              - listitem [ref=e107]: Date of any transaction
            - paragraph [ref=e108]: We will process your cancellation within 24 hours.
            - paragraph [ref=e109]: Once you cancel, your subscription will remain active until the end of the paid period, but you won't be charged again.
